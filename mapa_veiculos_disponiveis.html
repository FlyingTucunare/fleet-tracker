<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ITT - Veículos Disponíveis</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Barlow', 'Segoe UI', sans-serif; background:#f1f5f9; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  .header {
    display:flex; align-items:center; gap:12px;
    padding:8px 16px; background:#fff;
    border-bottom:1px solid #e2e8f0;
    height:52px; flex-shrink:0;
  }
  .htitle { font-size:15px; font-weight:700; color:#1e293b; letter-spacing:.3px; }
  .hsub { font-size:11px; color:#94a3b8; }
  .hbadge {
    margin-left:auto; padding:4px 12px; border-radius:20px;
    font-size:11px; font-weight:700; letter-spacing:.5px;
    background:#dcfce7; color:#16a34a;
  }

  .main { display:flex; flex:1; overflow:hidden; }

  .sidebar {
    width:260px; flex-shrink:0; background:#fff;
    border-right:1px solid #e2e8f0;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .sb-header {
    padding:12px 14px 8px; border-bottom:1px solid #f1f5f9;
  }
  .sb-title { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.8px; }
  .sb-count { font-size:22px; font-weight:800; color:#16a34a; margin-top:2px; }
  .sb-sub { font-size:11px; color:#94a3b8; }

  .sb-list { flex:1; overflow-y:auto; padding:8px; }
  .vcard {
    background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px;
    padding:10px 12px; margin-bottom:6px; cursor:pointer;
    transition:all .15s;
  }
  .vcard:hover { background:#eff6ff; border-color:#93c5fd; }
  .vcard.active { background:#eff6ff; border-color:#2563eb; }
  .vcard-placa { font-size:14px; font-weight:800; color:#1e293b; letter-spacing:.5px; }
  .vcard-modelo { font-size:11px; color:#64748b; margin-top:2px; }
  .vcard-local { font-size:10px; color:#94a3b8; margin-top:4px; }
  .vcard-badges { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
  .badge {
    font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px;
  }
  .badge-disp { background:#dcfce7; color:#16a34a; }
  .badge-manut { background:#fee2e2; color:#dc2626; }
  .badge-tipo { background:#e0f2fe; color:#0369a1; }

  #map { flex:1; }

  .popup-card { min-width:200px; }
  .popup-placa { font-size:16px; font-weight:800; color:#1e293b; margin-bottom:8px; }
  .popup-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
  .popup-label { color:#64748b; }
  .popup-value { font-weight:600; color:#1e293b; }
  .popup-badge { margin-top:8px; }
</style>
</head>

  <div>
    <div class="htitle">ITT - Veículos Disponíveis</div>
    <div class="hsub">Posição em tempo real · OpenStreetMap</div>
  </div>
  <div class="hbadge" id="hbadge">● AO VIVO</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-title">Frota Disponível</div>
      <div class="sb-count" id="sbCount">0</div>
      <div class="sb-sub">veículos disponíveis</div>
    </div>
    <div class="sb-list" id="sbList"></div>
  </div>
  <div id="map"></div>
</div>

<script>
const p = new URLSearchParams(window.location.search);

const map = L.map('map', {zoomControl:true}).setView([-15.78, -47.93], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', maxZoom:19
}).addTo(map);

// Parse veículos da URL
// Formato: placa|modelo|tipo|manutencao|lat|lon separados por ||
let veiculos = [];
try {
  const raw = p.get('v') || '';
  if (raw) {
    veiculos = raw.split('||')
      .filter(item => item && item.split('|').length >= 6)
      .map(item => {
        const parts = item.split('|');
        return {
          placa:     decodeURIComponent(parts[0] || ''),
          modelo:    decodeURIComponent(parts[1] || ''),
          tipo:      decodeURIComponent(parts[2] || ''),
          manutencao:decodeURIComponent(parts[3] || ''),
          lat:       parseFloat(parts[4] || ''),
          lng:       parseFloat(parts[5] || ''),
          local:     decodeURIComponent(parts[6] || ''),
          status:    decodeURIComponent(parts[7] || ''),
          ultimaAt:  decodeURIComponent(parts[8] || '')
        };
      })
      .filter(v => v.placa && !isNaN(v.lat) && !isNaN(v.lng) && v.lat !== 0 && v.lng !== 0);
  }
} catch(e) { veiculos = []; }

// Veículos sem posição GPS
let semPosicao = [];
try {
  const rawS = p.get('s') || '';
  if (rawS) {
    semPosicao = rawS.split('||')
      .filter(item => item && item.includes('|'))
      .map(item => {
        const parts = item.split('|');
        return {
          placa:   decodeURIComponent(parts[0] || ''),
          modelo:  decodeURIComponent(parts[1] || ''),
          tipo:    decodeURIComponent(parts[2] || ''),
          ultimaAt:decodeURIComponent(parts[3] || '')
        };
      })
      .filter(v => v.placa);
  }
} catch(e) { semPosicao = []; }

document.getElementById('sbCount').textContent = veiculos.length + semPosicao.length;

// Ícone veículo disponível
function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:36px;height:36px;border-radius:50%;
      background:${color};border:3px solid #fff;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;">🚛</div>`,
    iconSize:[36,36], iconAnchor:[18,18], popupAnchor:[0,-20]
  });
}

const markers = {};

veiculos.forEach((v, i) => {
  const emManut = v.manutencao && v.manutencao.toLowerCase() !== 'não' && v.manutencao !== '' && v.manutencao !== 'false';
  const cor = emManut ? '#f59e0b' : '#16a34a';

  const nuncaProg = v.status && v.status.toLowerCase().includes('nunca');
  const marker = L.marker([v.lat, v.lng], {icon: makeIcon(cor)})
    .addTo(map)
    .bindPopup(`
      <div class="popup-card">
        <div class="popup-placa">🚛 ${v.placa}</div>
        <div class="popup-row"><span class="popup-label">Modelo</span><span class="popup-value">${v.modelo || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">Tipo</span><span class="popup-value">${v.tipo || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">Localização</span><span class="popup-value">${v.local || '—'}</span></div>
        <div class="popup-badge">
          <span style="background:${emManut?'#fee2e2':'#dcfce7'};color:${emManut?'#dc2626':'#16a34a'};font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;">
            ${emManut ? '🔧 Em manutenção' : '✅ Disponível'}
          </span>
        </div>
      </div>
    `);

  markers[v.placa] = marker;

  // Card na sidebar
  const card = document.createElement('div');
  card.className = 'vcard';
  card.id = 'card-' + i;
  card.innerHTML = `
    <div class="vcard-placa">${v.placa}</div>
    <div class="vcard-modelo">${v.modelo || '—'} · ${v.tipo || '—'}</div>
    <div class="vcard-local">${v.local || '—'}</div>
    <div class="vcard-badges">
      <span class="badge badge-tipo">${v.tipo || 'Veículo'}</span>
      <span class="badge ${emManut ? 'badge-manut' : 'badge-disp'}">${emManut ? '🔧 Manutenção' : '✅ Disponível'}</span>
    </div>
  `;
  card.addEventListener('click', () => {
    document.querySelectorAll('.vcard').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    map.setView([v.lat, v.lng], 12);
    marker.openPopup();
  });
  document.getElementById('sbList').appendChild(card);
});

if (veiculos.length > 0) {
  const bounds = L.latLngBounds(veiculos.map(v => [v.lat, v.lng]));
  map.fitBounds(bounds.pad(0.1));
}

// Adiciona separador e cards sem GPS na sidebar
if (semPosicao.length > 0) {
  const sep = document.createElement('div');
  sep.style.cssText = 'padding:8px 12px 4px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;border-top:1px solid #f1f5f9;margin-top:4px;';
  sep.textContent = '⚠ Sem posição GPS (' + semPosicao.length + ')';
  document.getElementById('sbList').appendChild(sep);

  semPosicao.forEach(v => {
    const card = document.createElement('div');
    card.className = 'vcard';
    card.style.opacity = '0.7';
    card.innerHTML = `
      <div class="vcard-placa">${v.placa}</div>
      <div class="vcard-modelo">${v.modelo || '—'} · ${v.tipo || '—'}</div>
      ${v.ultimaAt ? `<div class="vcard-local">📅 ${v.ultimaAt}</div>` : ''}
      <div class="vcard-badges">
        <span class="badge badge-tipo">${v.tipo || 'Veículo'}</span>
        <span class="badge" style="background:#fef9c3;color:#854d0e;">⭐ Nunca programado</span>
        <span class="badge" style="background:#f1f5f9;color:#64748b;">📡 Sem GPS</span>
      </div>
    `;
    document.getElementById('sbList').appendChild(card);
  });
}
</script>
</body>
</html>
